{% extends 'base.html' %}

{% block title %}Course Form{% endblock %}

{% block content %}
    <h1>{% if form.instance.pk %}Edit{% else %}New{% endif %} Course</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Save</button>
    </form>
    <br>
    <a href="{% url 'course_list' %}">Cancel</a>
{% endblock %}
