{% extends 'base.html' %}

{% block title %}Course List{% endblock %}

{% block content %}
    <h1>Courses</h1>
    <ul>
        {% for course in courses %}
            <li>
                <a href="{% url 'course_detail' course.pk %}">{{ course.title }}</a>
                - {{ course.instructor }}
            </li>
        {% empty %}
            <li>No courses available.</li>
        {% endfor %}
    </ul>
{% endblock %}
